<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>gallery carousel 1</title>
<!-- iframe内は自社ドメイン扱い＝JS自由。楽天GOLDのJS禁止を突破するための隔離ページ。
     画像は本ファイル(assets/frame/)からの相対参照(../img/…)＝サーバー移設時もそのまま解決 -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.8.1/slick.min.css">
<style>
  html, body { margin: 0; height: 100%; background: #0d0f10; overflow: hidden; }
  .car, .car .slick-list, .car .slick-track,
  .car .slick-slide, .car .slick-slide > div { height: 100%; }
  .car img { width: 100%; height: 100%; object-fit: cover; display: block; }
  /* 初期化前のちらつき防止：最初の1枚だけ表示 */
  .car:not(.slick-initialized) > div { display: none; }
  .car:not(.slick-initialized) > div:first-child { display: block; height: 100%; }
</style>
</head>
<body>
  <div class="car">
    <div><img src="../img/gallery1-01.jpg" alt="露天風呂から望む相模湾の眺望"></div>
    <div><img src="../img/gallery1-02.jpg" alt="時とともに移ろう客室からの景色"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.8.1/slick.min.js"></script>
  <script>
    jQuery(function ($) {
      $('.car').slick({
        fade: true,               // クロスフェード
        autoplay: true,
        autoplaySpeed: 4200,
        speed: 1600,
        cssEase: 'cubic-bezier(0.4, 0, 0.2, 1)',
        arrows: false,
        dots: false,
        pauseOnHover: false,
        pauseOnFocus: false,
        draggable: false,
        accessibility: false
      });
    });
  </script>
</body>
</html>
