<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>rooms carousel (SP)</title>
<!-- SP客室カルーセル：全幅1枚ずつの横スライド＋室名ラベル。iframe内=JS自由 -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.8.1/slick.min.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500&display=swap">
<style>
  html, body { margin: 0; height: 100%; background: transparent; overflow: hidden; }
  .car, .car .slick-list, .car .slick-track, .car .slick-slide { height: 100%; }
  .rm { position: relative; height: 100%; }
  .rm img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .rm__label {
    position: absolute; right: 0; bottom: 0;
    padding: 6px 12px; background: rgba(0,0,0,.22); color: #fff;
    font-family: "Shippori Mincho", serif; font-weight: 500;
    font-size: clamp(11px, 3.2vw, 13px); letter-spacing: .08em; line-height: 1; white-space: nowrap;
  }
  .car:not(.slick-initialized) .rm { display: none; }
  .car:not(.slick-initialized) .rm:first-child { display: block; }
</style>
</head>
<body>
  <div class="car">
    <div class="rm"><img src="../img/room-tei-hana.jpg" alt="本館 汀・華 客室"><span class="rm__label">本館 汀・華</span></div>
    <div class="rm"><img src="../img/room-kihinshitsu-yama.jpg" alt="貴賓室 山 客室"><span class="rm__label">貴賓室 山</span></div>
    <div class="rm"><img src="../img/room-sokai.jpg" alt="特別室 蒼・海 客室"><span class="rm__label">特別室 蒼・海</span></div>
    <div class="rm"><img src="../img/room-tomoshibi.jpg" alt="特別室 燈 客室"><span class="rm__label">特別室 燈</span></div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.8.1/slick.min.js"></script>
  <script>
    jQuery(function ($) {
      $('.car').slick({
        slidesToShow: 1, autoplay: true, autoplaySpeed: 3600, speed: 700,
        cssEase: 'cubic-bezier(0.4,0,0.2,1)', arrows: false, dots: false,
        pauseOnHover: false, draggable: true, accessibility: false
      });
    });
  </script>
</body>
</html>
